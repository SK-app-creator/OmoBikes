<title>Cycle Part Finder</title>




<div id="cycle-finder-container">


  <!-- STEP 0: Welcome Page -->
  <div id="step-0" class="finder-step welcome-page">
    <div class="welcome-inner">
      <div class="welcome-emoji">🚲</div>
      <h1 class="welcome-headline">Not sure which part fits your cycle or your budget?</h1>
      <p class="welcome-sub">Answer 2 quick questions and we'll show you exactly what to buy.</p>
      <button class="cta-btn" onclick="showStep(1)">Find My Part →</button>
    </div>
  </div>


  <div id="step-1" class="finder-step" style="display:none;">
    <button onclick="goBack(0)" class="back-btn">← Back</button>
    <h2>Select a Cycle Part</h2>
    <div class="grid-container" id="parts-grid"></div>
  </div>


  <div id="step-2" class="finder-step" style="display:none;">
    <button onclick="goBack(1)" class="back-btn">← Back</button>
    <h2>Select Your Budget</h2>
    <div class="grid-container" id="budget-grid"></div>
  </div>


  <div id="step-3" class="finder-step" style="display:none;">
    <button onclick="goBack(2)" class="back-btn">← Back</button>
    <h2>Recommended Products</h2>
    <div class="grid-container" id="product-grid"></div>
  </div>
</div>


<style>
  /* Base Container Styles */
  #cycle-finder-container { font-family: sans-serif; max-width: 1000px; margin: 0 auto; text-align: center; padding: 20px; }
  
  /* Responsive Grid — 2 cards minimum on mobile */
  .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
  
  /* UPDATED CARD STYLE (Centering icons and text) */
  .card { 
    border: 1px solid #ddd; 
    padding: 25px; 
    cursor: pointer; 
    transition: 0.3s; 
    border-radius: 12px; 
    min-height: 120px; /* Slightly taller for icons */
    display: flex; 
    flex-direction: column; 
    justify-content: center; /* Vertical Center */
    align-items: center; /* Horizontal Center */
    color: #333; /* Dark text */
    box-sizing: border-box;
  }
  
  /* Specific styling for the generated icon element */
  .card-icon {
    font-size: 2.2rem; /* Size of the icon/emoji */
    margin-bottom: 8px; /* Space between icon and text */
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  /* Text styling inside the card */
  .card h3 { margin: 0; font-size: 1.1rem; font-weight: bold; }
  
  /* Style for Step 3 View Details */
  .card p { margin: 5px 0 0 0; font-size: 0.85rem; font-weight: normal; opacity: 0.8; }


  /* Hover and Interaction Effects */
  .card:hover { 
    transform: translateY(-5px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    filter: brightness(0.9);
  }


  /* Back button styling */
  .back-btn { float: left; background: #eee; border: 1px solid #ccc; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
  .no-results { grid-column: 1 / -1; padding: 40px; background: #f9f9f9; border-radius: 12px; }


  /* ── Welcome Page (Step 0) ── */
  .welcome-page {
    background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
    border-radius: 20px;
    padding: 0;
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .welcome-inner {
    padding: 48px 32px;
    max-width: 520px;
    margin: 0 auto;
  }
  .welcome-emoji {
    font-size: 3.5rem;
    margin-bottom: 20px;
    line-height: 1;
  }
  .welcome-headline {
    font-size: 1.55rem;
    font-weight: 800;
    color: #1b5e20;
    margin: 0 0 16px 0;
    line-height: 1.35;
  }
  .welcome-sub {
    font-size: 1rem;
    color: #388e3c;
    margin: 0 0 32px 0;
    line-height: 1.6;
  }
  .cta-btn {
    background: #2e7d32;
    color: #fff;
    border: none;
    padding: 14px 36px;
    font-size: 1.05rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 14px rgba(46,125,50,0.35);
  }
  .cta-btn:hover {
    background: #1b5e20;
    transform: translateY(-2px);
  }


  /* Mobile tweaks */
  @media (max-width: 480px) {
    .welcome-headline { font-size: 1.25rem; }
    .welcome-inner { padding: 36px 20px; }
    .grid-container { grid-template-columns: repeat(2, 1fr); }
  }
</style>

// A friendly color palette
const colors = ["#FFDDC1", "#C2E9FB", "#D1FFD6", "#F3D1FF", "#FFF5D1", "#E2E2E2", "#FFC1C1", "#C1FFFB"];


let userChoices = { part: null, budget: null };


function init() {
  const partsGrid = document.getElementById('parts-grid');
  // MODIFIED: Read the icon definition during card creation
  finderData.partsWithIcons.forEach((partObj, index) => {
    const color = colors[index % colors.length];
    partsGrid.innerHTML += `
      <div class="card" style="background-color: ${color}" onclick="selectPart('${partObj.name}')">
        <span class="card-icon">${partObj.icon}</span>
        <h3>${partObj.name}</h3>
      </div>`;
  });


  const budgetGrid = document.getElementById('budget-grid');
  finderData.budgets.forEach((amount, index) => {
    const color = colors[(index + 2) % colors.length]; // Offset color for variety
    budgetGrid.innerHTML += `<div class="card" style="background-color: ${color}" onclick="selectBudget(${amount})"><h3>Below Rs ${amount}</h3></div>`;
  });
}


function selectPart(partName) {
  userChoices.part = partName;
  showStep(2);
}


function selectBudget(budget) {
  userChoices.budget = budget;
  renderProducts();
  showStep(3);
}


function renderProducts() {
  const productGrid = document.getElementById('product-grid');
  const step3Title = document.querySelector('#step-3 h2');
  const key = `${userChoices.part}-${userChoices.budget}`;
  const results = finderData.products[key] || [];


  // Updates the heading with the specific budget selected
  if (step3Title) {
    step3Title.innerText = `Recommended Products for Rs ${userChoices.budget.toLocaleString()} Budget`;
  }


  if (results.length > 0) {
    productGrid.innerHTML = results.map((p, index) => {
      const color = colors[(index + 4) % colors.length];
      return `<div class="card" style="background-color: ${color}" onclick="window.location.href='${p.url}'"><h3>${p.name}</h3><p>View Details</p></div>`;
    }).join('');
  } else {
    // Logic for suggesting alternative budgets...
    productGrid.innerHTML = `<div class="no-results"><p>No products found in this range for <strong>${userChoices.part}</strong>. Try Other Options.</p></div>`;
  }
}


function showStep(stepNum) {
  document.querySelectorAll('.finder-step').forEach(s => s.style.display = 'none');
  const target = document.getElementById('step-' + stepNum);
  target.style.display = stepNum === 0 ? 'flex' : 'block';
}


function goBack(stepNum) {
  showStep(stepNum);
}


// Start on welcome page
showStep(0);
init();
</script>
